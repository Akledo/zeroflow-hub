<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="zf-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B2FFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="zf-gradient-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B2FFF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Flow symbol: continuous stream line that flows into a zero -->
  <g transform="translate(20, 25)">
    <!-- Stream line entering from left -->
    <path d="M 0,75 Q 20,75 30,65 Q 40,55 50,65 Q 60,75 70,65 Q 80,55 90,65 Q 100,75 110,65"
          fill="none" stroke="url(#zf-gradient-h)" stroke-width="4" stroke-linecap="round" />

    <!-- Zero circle - outer -->
    <circle cx="150" cy="75" r="32" fill="none" stroke="url(#zf-gradient)" stroke-width="4.5" />

    <!-- Zero circle - inner (the "hole" of zero) -->
    <circle cx="150" cy="75" r="14" fill="none" stroke="url(#zf-gradient)" stroke-width="2" />

    <!-- Stream line exiting right -->
    <path d="M 182,75 Q 200,75 210,65 Q 220,55 230,65 Q 240,75 250,65 Q 260,55 270,65 Q 280,75 290,65"
          fill="none" stroke="url(#zf-gradient-h)" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- ZeroFlow Wordmark -->
  <g transform="translate(0, 120)">
    <!-- "Zero" -->
    <text x="0" y="50" font-family="'Inter', 'Segoe UI', -apple-system, Helvetica, sans-serif"
          font-weight="700" font-size="58" fill="#0A1628" letter-spacing="1">Zero</text>

    <!-- "Flow" with gradient -->
    <text x="175" y="50" font-family="'Inter', 'Segoe UI', -apple-system, Helvetica, sans-serif"
          font-weight="700" font-size="58" fill="url(#zf-gradient)" letter-spacing="1">Flow</text>
  </g>
</svg>