<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="zf-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-color:opacity:1" />
      <stop offset="100%" style="stop-color:#7B2FFF;stop-color:opacity:1" />
    </linearGradient>
  </defs>

  <!-- Flowing stream into zero -->
  <g transform="translate(100, 100)">
    <!-- Stream line entering from left -->
    <path d="M -90,0 Q -70,0 -60,-10 Q -50,-20 -40,-10 Q -30,0 -20,-10 Q -10,-20 0,-10"
          fill="none" stroke="url(#zf-gradient)" stroke-width="5" stroke-linecap="round" />

    <!-- Zero outer ring -->
    <circle cx="0" cy="0" r="36" fill="none" stroke="url(#zf-gradient)" stroke-width="5" />

    <!-- Zero inner ring -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="url(#zf-gradient)" stroke-width="2.5" />

    <!-- Stream line exiting right -->
    <path d="M 36,0 Q 55,0 65,-10 Q 75,-20 85,-10 Q 95,0 105,-10"
          fill="none" stroke="url(#zf-gradient)" stroke-width="5" stroke-linecap="round" />
  </g>
</svg>