<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="zf-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B2FFF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Simplified favicon: zero symbol -->
  <g transform="translate(100, 100)">
    <!-- Zero outer ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="url(#zf-gradient)" stroke-width="6" />
    <!-- Zero inner ring -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="url(#zf-gradient)" stroke-width="3" />
    <!-- Incoming flow line -->
    <path d="M -90,0 Q -75,0 -65,-8 Q -55,-15 -48,-6"
          fill="none" stroke="url(#zf-gradient)" stroke-width="5" stroke-linecap="round" />
  </g>
</svg>